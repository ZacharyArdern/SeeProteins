<!DOCTYPE html>
<html>
<head>
  <script src="ort.min.js"></script>
</head>
<body>
<pre id="out"></pre>
<script>
function log(msg) {
    console.log(msg);
    document.getElementById('out').textContent += msg + '\n';
}

(async () => {
    try {
        const o = window.ort;
        if (!o) { log('ERROR: window.ort is undefined'); window._ortTestDone = true; return; }
        log('ort version: ' + (o.env?.versions?.web ?? 'unknown'));

        o.env.wasm.wasmPaths = '/';
        o.env.wasm.numThreads = 1;
        log('wasmPaths set to /');

        log('Creating InferenceSession from thermompnn.onnx ...');
        let session;
        try {
            session = await o.InferenceSession.create('/thermompnn.onnx', {
                executionProviders: ['wasm'],
            });
        } catch(e) {
            log('Session create ERROR: ' + e.message);
            log('Stack: ' + (e.stack || '(no stack)'));
            window._ortTestDone = true;
            return;
        }
        log('Session OK — inputs: ' + session.inputNames.join(', '));

        const L = 50;
        const X            = new Float32Array(L * 4 * 3).fill(0);
        const S            = new BigInt64Array(L).fill(0n);
        const mask         = new Float32Array(L).fill(1);
        const residue_idx  = new BigInt64Array(Array.from({length:L}, (_,i) => BigInt(i)));
        const chain_enc    = new BigInt64Array(L).fill(1n);

        log('Running inference (L=50) ...');
        let result;
        try {
            result = await session.run({
                X:              new o.Tensor('float32', X,           [1, L, 4, 3]),
                S:              new o.Tensor('int64',   S,           [1, L]),
                mask:           new o.Tensor('float32', mask,        [1, L]),
                residue_idx:    new o.Tensor('int64',   residue_idx, [1, L]),
                chain_encoding: new o.Tensor('int64',   chain_enc,   [1, L]),
            });
        } catch(e) {
            log('Session run ERROR: ' + e.message);
            window._ortTestDone = true;
            return;
        }
        const logits = result.logits.data;
        log('Inference OK — logits[0..4]: ' + Array.from(logits.slice(0,4)).map(x=>x.toFixed(4)).join(', '));
    } catch(e) {
        log('Unexpected ERROR: ' + e.message);
    }
    window._ortTestDone = true;
})();
</script>
</body>
</html>
